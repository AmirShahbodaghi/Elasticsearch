---
- name: Create required directory structure on all hosts
  file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "0"
    mode: '0755'
  loop:
    - "{{ es_base_dir }}"
    - "{{ es_base_dir }}/certs"
    - "{{ es_base_dir }}/esdata"

- name: Ensure vm.max_map_count is set in sysctl.conf
  ansible.builtin.lineinfile:
    path: /etc/sysctl.conf
    regexp: '^vm\.max_map_count='
    line: 'vm.max_map_count=262144'
    create: yes

- name: Apply sysctl settings
  ansible.builtin.command:
    cmd: sysctl -w vm.max_map_count=262144

- name: Generate CA certificate on Node 1
  command: >
    docker run --rm
    --user 0:0
    -v {{ es_base_dir }}/certs:/certs
    {{ es_image }}
    bin/elasticsearch-certutil ca --silent --out /certs/elastic-stack-ca.p12 --pass ""
  when: inventory_hostname == ansible_play_hosts[0]
  args:
    creates: "{{ es_base_dir }}/certs/elastic-stack-ca.p12"

- name: Generate Node certificates on Node 1
  command: >
    docker run --rm
    --user 0:0
    -v {{ es_base_dir }}/certs:/certs
    {{ es_image }}
    bin/elasticsearch-certutil cert --silent --out /certs/elastic-certificates.p12 --ca /certs/elastic-stack-ca.p12 --pass "" --ca-pass ""
  when: inventory_hostname == ansible_play_hosts[0]
  args:
    creates: "{{ es_base_dir }}/certs/elastic-certificates.p12"

- name: Fetch generated certificates from Node 1 to Ansible Controller
  fetch:
    src: "{{ es_base_dir }}/certs/elastic-certificates.p12"
    dest: "/opt/elastic-certificates.p12"
    flat: yes
  when: inventory_hostname == ansible_play_hosts[0]

- name: Copy certificates to all nodes
  copy:
    src: "/opt/elastic-certificates.p12"
    dest: "{{ es_base_dir }}/certs/elastic-certificates.p12"
    mode: '0644'

- name: Set strict file permissions on certificates
  file:
    path: "{{ es_base_dir }}/certs/elastic-certificates.p12"
    owner: "1000"
    group: "0"
    mode: '0600'

- name: Deploy docker-compose.yml file from template
  template:
    src: docker-compose.yml.j2
    dest: "{{ es_base_dir }}/docker-compose.yml"

- name: Start Elasticsearch via Docker Compose CLI
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ es_base_dir }}"